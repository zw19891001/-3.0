<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张雯老师3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .name { font-size: 20px; font-weight: bold; }
        .chat {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .msg {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
        }
        .msg.teacher { flex-direction: row; }
        .msg.student { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .msg-content {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 8px;
        }
        .msg.teacher .msg-content {
            background: white;
            border-bottom-left-radius: 4px;
        }
        .msg.student .msg-content {
            background: #4facfe;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 42px;
            font-family: inherit;
        }
        .input:focus { border-color: #4facfe; }
        .send {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .send:disabled { opacity: 0.6; }
        .typing {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            margin-left: 40px;
            margin-bottom: 12px;
        }
        .typing.on { display: flex; }
        .typing span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .welcome {
            text-align: center;
            color: #888;
            padding: 60px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="智慧老师照片.jpg" class="avatar">
            <div class="name">张雯老师3.0</div>
        </div>
        <div class="chat" id="chat">
            <div class="welcome" id="welcome">👩‍🏫 你好呀！我是张雯老师3.0，是一位温柔耐心的智慧老师。我致力于帮助学生解答各学科知识、学习问题，让你的学习之路更加顺畅。😊 你可以随时向我提问，无论是数学、科学、最新科技还是其他学科以及教学教务的问题，我都会尽力为你解答。</div>
            <div class="typing" id="typing"><span></span><span></span><span></span></div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea class="input" id="input" placeholder="输入问题..." rows="1"></textarea>
                <button class="send" id="send">➤</button>
            </div>
        </div>
    </div>
    <script>
        const API = 'https://qianfan.baidubce.com/v2/chat/completions';
        const KEY = 'bce-v3/ALTAK-jsNPkhuMDPrrD9uBXGHXk/b3bcc6b6cf9f7b29fe17ce350b98ad8a43e6adec';
        const MODEL = 'ernie-lite-pro-128k';
        const SYS = `你是张雯老师3.0，是一位温柔、耐心、知识渊博的智慧老师。

【角色定位】
你致力于帮助学生解答各学科知识、学习问题，让学生的学习之路更加顺畅。

【擅长领域】
- 各学科知识讲解（数学、物理、化学、生物、英语、语文、历史、地理等）
- 作业题、考试题讲解与分析
- 最新科技知识介绍
- 学习方法和技巧指导
- 生涯规划和建议
- 编程与计算机知识

【回答风格】
- 语气亲切温柔，像一位贴心的老师关爱学生
- 回答专业、准确、易懂
- 善于用简单生动的例子解释复杂知识
- 可以适当使用emoji让回答更生动有趣`;
        let history = [{ role: 'system', content: SYS }];
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 80) + 'px'; });
        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQ(); } });
        send.addEventListener('click', sendQ);
        function sendQ() {
            const q = input.value.trim();
            if (!q) return;
            welcome.style.display = 'none';
            addMsg(q, 'student');
            input.value = '';
            input.style.height = '42px';
            typing.classList.add('on');
            send.disabled = true;
            history.push({ role: 'user', content: q });
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
                body: JSON.stringify({ model: MODEL, messages: history, temperature: 0.7 })
            }).then(r => r.json()).then(d => {
                const a = d.choices?.[0]?.message?.content || '抱歉，无法回答。';
                history.push({ role: 'assistant', content: a });
                addMsg(a, 'teacher');
            }).catch(() => addMsg('连接失败，请重试。', 'teacher'));
            typing.classList.remove('on');
            send.disabled = false;
        }
        function addMsg(content, who) {
            const div = document.createElement('div');
            div.className = 'msg ' + who;
            const avatar = who === 'teacher' ? `<img src="智慧老师照片.jpg" class="msg-avatar">` : `<img src="data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><rect width="32" height="32" rx="16" fill="#4facfe"/><text x="16" y="21" text-anchor="middle" fill="white" font-size="14">学</text></svg>')}" class="msg-avatar">`;
            div.innerHTML = avatar + `<div class="msg-content">${content}</div>`;
            chat.insertBefore(div, typing);
        }
    </script>
</body>
</html>
