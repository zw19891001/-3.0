<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧老师3.0 - 智慧分身</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 25px 20px;
            text-align: center;
            color: white;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: cover;
            margin-bottom: 10px;
        }
        .teacher-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .teacher-title { font-size: 13px; opacity: 0.9; }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message { margin-bottom: 15px; display: flex; align-items: flex-start; }
        .message.teacher { flex-direction: row; }
        .message.student { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 10px;
        }
        .message.teacher .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message.student .message-content {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-wrapper { display: flex; gap: 10px; }
        .question-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 44px;
            font-family: inherit;
        }
        .question-input:focus { border-color: #4facfe; }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            margin-left: 46px;
            margin-bottom: 15px;
        }
        .typing.active { display: flex; }
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        .welcome-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="智慧老师照片.jpg" alt="张雯老师" class="avatar">
            <div class="teacher-name">智慧老师3.0</div>
            <div class="teacher-title">你的智慧学习伙伴</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMsg">
                <h3>👩‍🏫 你好！我是张雯老师3.0</h3>
                <p>有什么学习上的问题可以问我哦～</p>
            </div>
            <div class="typing" id="typing"><span></span><span></span><span></span></div>
        </div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="question-input" id="questionInput" placeholder="请输入你的问题..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        let userConfig = {};
        try { userConfig = JSON.parse(localStorage.getItem('zhangwen_config') || '{}'); } catch(e) {}
        
        const API_URL = 'https://qianfan.baidubce.com/v2/chat/completions';
        const API_KEY = 'bce-v3/ALTAK-jsNPkhuMDPrrD9uBXGHXk/b3bcc6b6cf9f7b29fe17ce350b98ad8a43e6adec';
        const MODEL = userConfig.model || 'ernie-lite-pro-128k';
        
        let systemPrompt = userConfig.knowledge || '你是张雯老师3.0，一位温柔、有耐心、知识渊博的老师。你善于用简单易懂的方式解释复杂的知识，帮助学生理解和掌握知识点。你的回复要亲切、专业、有帮助。';
        
        let conversationHistory = [{ role: 'system', content: systemPrompt }];
        
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatArea = document.getElementById('chatArea');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const typing = document.getElementById('typing');
        
        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        questionInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            welcomeMsg.style.display = 'none';
            addMessage(question, 'student');
            questionInput.value = '';
            questionInput.style.height = '44px';
            typing.classList.add('active');
            chatArea.scrollTop = chatArea.scrollHeight;
            sendBtn.disabled = true;
            
            try {
                conversationHistory.push({ role: 'user', content: question });
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: conversationHistory,
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                const answer = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答这个问题。';
                
                conversationHistory.push({ role: 'assistant', content: answer });
                addMessage(answer, 'teacher');
            } catch (error) {
                addMessage('抱歉，连接出现了问题。请稍后再试。', 'teacher');
            }
            
            typing.classList.remove('active');
            sendBtn.disabled = false;
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const avatarSrc = sender === 'teacher' ? '智慧老师照片.jpg' : 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="18" fill="#4facfe"/><text x="18" y="22" text-anchor="middle" fill="white" font-size="16">学</text></svg>');
            
            messageDiv.innerHTML = `
                <img src="${avatarSrc}" class="message-avatar" alt="${sender === 'teacher' ? '张雯老师' : '学生'}">
                <div class="message-content">${content}</div>
            `;
            chatArea.insertBefore(messageDiv, typing);
        }
    </script>
</body>
</html>
