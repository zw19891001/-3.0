<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧老师3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .name { font-size: 20px; font-weight: bold; }
        .chat {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .msg {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
        }
        .msg.teacher { flex-direction: row; }
        .msg.student { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .msg-content {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 8px;
        }
        .msg.teacher .msg-content {
            background: white;
            border-bottom-left-radius: 4px;
        }
        .msg.student .msg-content {
            background: #4facfe;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 42px;
            font-family: inherit;
        }
        .input:focus { border-color: #4facfe; }
        .send {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .send:disabled { opacity: 0.6; }
        .typing {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            margin-left: 40px;
            margin-bottom: 12px;
        }
        .typing.on { display: flex; }
        .typing span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .welcome {
            text-align: center;
            color: #888;
            padding: 60px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="智慧老师照片.jpg" class="avatar">
            <div class="name">张雯老师3.0</div>
        </div>
        <div class="chat" id="chat">
            <div class="welcome" id="welcome">👩‍🏫 有问题尽管问我～</div>
            <div class="typing" id="typing"><span></span><span></span><span></span></div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea class="input" id="input" placeholder="输入问题..." rows="1"></textarea>
                <button class="send" id="send">➤</button>
            </div>
        </div>
    </div>
    <script>
        const API = 'https://qianfan.baidubce.com/v2/chat/completions';
        const KEY = 'bce-v3/ALTAK-jsNPkhuMDPrrD9uBXGHXk/b3bcc6b6cf9f7b29fe17ce350b98ad8a43e6adec';
        const MODEL = 'ernie-lite-pro-128k';
        const SYS = `你是张雯老师3.0，来自上海工程技术大学航空运输学院，是一位温柔、有耐心、知识渊博的老师助手。

【核心职责】
帮助学生解答教务相关问题，包括选课、加课、退课、转专业、培养计划、成绩查询、毕业流程等。

【加课流程】
- 加课时间：每学期开学第三周
- 退课时间：开学后前三周
- 流程：找好课程代码→到航飞楼6425发起申请→找任课老师系统通过
- 注意：课程代码须与培养计划一致，代码变更要做替代才有成绩

【选课流程】
- 进入学生系统，找到个人培养计划
- 核对本学期需要修读的课程
- 进入对应模块，删除前置条件学期限制，再进行课程检索
- 毕业班学生所有模块都要进入检索

【课程替代流程】
- 替代是课程代码变更后更新培养计划的过程
- 步骤：登录https://webvsp.sues.edu.cn/→找到规定代码与修读代码→到6425申请替代
- 只有替代后才有学分

【培养计划查看】
- 登录学生系统→个人培养计划
- 毕业班：左上角→培养计划完成情况
- 看三级模块，必修课程都要完成，右边显示绿色"通过"即达标

【通识选修课代码】
Y-艺术体验与审美修养
R-历史文化与人文情怀
G-社会发展与国际视野
L-哲学智慧与工程伦理
Z-科学素养与科技探索
X-创新思维与创业教育

【常见问题】
- 联系老师：拨打67791118或到航飞楼6425
- 学生系统：https://webvpn.sues.edu.cn/
- 教务处：https://jwc.sues.edu.cn/
- 体质健康学分：由体育部按班级录入
- 创新创业学分：找赵老师
- 素拓学分：找辅导员
- 毕业论文：不用选，学校统一录入

【回答风格】
- 亲切温柔，像张雯老师一样关爱学生
- 回答专业、准确、易懂
- 适当使用emoji
- 不确定的问题引导联系老师`;
        let history = [{ role: 'system', content: SYS }];
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 80) + 'px'; });
        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQ(); } });
        send.addEventListener('click', sendQ);
        function sendQ() {
            const q = input.value.trim();
            if (!q) return;
            welcome.style.display = 'none';
            addMsg(q, 'student');
            input.value = '';
            input.style.height = '42px';
            typing.classList.add('on');
            send.disabled = true;
            history.push({ role: 'user', content: q });
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
                body: JSON.stringify({ model: MODEL, messages: history, temperature: 0.7 })
            }).then(r => r.json()).then(d => {
                const a = d.choices?.[0]?.message?.content || '抱歉，无法回答。';
                history.push({ role: 'assistant', content: a });
                addMsg(a, 'teacher');
            }).catch(() => addMsg('连接失败，请重试。', 'teacher'));
            typing.classList.remove('on');
            send.disabled = false;
        }
        function addMsg(content, who) {
            const div = document.createElement('div');
            div.className = 'msg ' + who;
            const avatar = who === 'teacher' ? `<img src="智慧老师照片.jpg" class="msg-avatar">` : `<img src="data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><rect width="32" height="32" rx="16" fill="#4facfe"/><text x="16" y="21" text-anchor="middle" fill="white" font-size="14">学</text></svg>')}" class="msg-avatar">`;
            div.innerHTML = avatar + `<div class="msg-content">${content}</div>`;
            chat.insertBefore(div, typing);
        }
    </script>
</body>
</html>
