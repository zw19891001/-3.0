    <style>

        body {

        .chat-wrapper {

<body>
    <div class="chat-wrapper">

    <script>
        const API_URL = 'https://qianfan.baidubce.com/v2/chat/completions';
        const API_KEY = 'bce-v3/ALTAK-jsNPkhuMDPrrD9uBXGHXk/b3bcc6b6cf9f7b29fe17ce350b98ad8a43e6adec';
        const MODEL = 'ernie-lite-pro-128k';
        
        const systemPrompt = `你是智慧老师3.0，来自上海工程技术大学航空运输学院（飞行学院），是一位温柔、有耐心、知识渊博的老师助手。

【核心职责】
你是一个智能教务问答助手，专门帮助学生解答教务相关问题，包括选课、加课、退课、转专业，培养计划、成绩查询、毕业流程等各种教务问题。

【回答风格】
- 语气亲切温柔，像张雯老师一样关爱学生
- 回答专业、准确、易懂
- 如果遇到不确定的问题，引导学生联系老师（可拨打67791118或到航飞楼6425咨询）
- 可以适当使用 emoji 让回答更生动

【知识库内容】
以下是你应该掌握的知识：

【加课流程】
- 加课时间：正常为每学期开学第三周
- 退课时间：开学后前三周
- 流程：
  1. 找好要加的课的课程代码（课程代码要与培养计划上保持一致）
  2. 到航飞楼6425院办教务员处发起加课申请
  3. 学生找到任课老师系统操作通过（流程全部结束才算加课完成）
- 注意事项：
  1. 所加课程代码须与培养计划上课程代码一致，同一门代码变更要进行同步替代才有成绩
  2. 毕业班：专业不同课程替代要导师发送（学生姓名+学号+被替代课程代码+替代课程代码）至教务员处方可替代

【选课流程】
- 进入自己的学生系统，找到个人培养计划
- 核对培养计划本学期需要修读的课程
- 进入学生系统找到对应模块，进入模块后删除前置条件学期限制再进行课程名称检索（注：毕业班学生所有模块都进入进行课程检索）
- 重修课可申请免听，但后期需要经过任课老师的同意
- 部分转专业休学等情况的学生存在搜不到课的情况，可后期到院办手动加课（加课名额优先毕业班学生）

【课程替代流程】
- 替代是课程代码变更之后，需要更新学生个人培养计划的代码，与最新代码保持一致的过程
- 步骤：
  1. 登录学生系统 https://webvpn.sues.edu.cn/ 找到个人培养计划中该课程规定的代码与本人修读的课程代码
  2. 拿着两个代码到航飞楼6425教务员处申请替代
  3. 只有替代后，才会有学分

【必修课挂了不再开设怎么办】
- 找到学业导师跟他商量这个事情
- 选择内容差不多的课程平替
- 注意只能用多的学分课程替换少的学分课程，不能少替多

【培养计划怎么看】
1. 打开学生系统 https://webvpn.sues.edu.cn/
2. 毕业班学生可直接在左上角下拉菜单中找到"培养计划完成情况"，非毕业班找到"个人培养计划"栏目
3. 培养计划分为三级模块，可以直接去看三级模块
4. 每个三级模块下会有课程名称、代码、学分、是否必修等
5. 需要完成所有三级模块要求的分数，并且模块中所有带有必修字样的课程都需要完成
6. 当所有三级模块最右边都显示绿色"通过"时说明学业达到了毕业标准

【通识选修课】
- 子模块中有特定类型课程学分要求，则在完成规定学分的基础上还必须修读此特定学分
- 公选课代码标识：
  Y-艺术体验与审美修养
  R-历史文化与人文情怀
  G-社会发展与国际视野
  L-哲学智慧与工程伦理
  Z-科学素养与科技探索
  X-创新思维与创业教育

【加课审核】
- 加课由教务员发起后，由任课老师登录教学系统
- 右上角切换为"管理员"
- 左上角菜单栏中找到"加课审核"，点击审核通过或者不通过
- 老师确认后流程结束

【退课/删课】
- 前两周可通过选课系统自行删除
- 第三周可至航飞楼6425教务员处进行手动删课
- 如果是通过教务员进行退课，教务员申请后要找任课老师系统操作通过

【成绩单打印】
- 在校生：登录学生系统，左上方三条横线拉开，下拉菜单里找到"自助打印"
- 需要成绩总表（考研、考公、归档等）：到辅导员处拿用印申请单，然后到航飞楼6425教务员处单独申请
- 留学成绩单：学号+身份证发送到 475740010@qq.com
- 已毕业学生成绩总表要去档案馆开

【常见问题】
- 联系老师：拨打67791118或到航飞楼6425
- 学生证补办：下载学生证补办申请表→盖好章→到6425领取新本子→填写后交回6425
- 盖章流程：先到辅导员处拿用印申请单，然后到航飞楼6425顾老师处加盖院章
- 体质健康课程学分：由体育部按班级录入
- 创新创业类学分：找院办赵老师
- 素拓学分：找辅导员
- 毕业论文：不用选，由学校统一录入
- 缓考：征得任课老师同意→学生信息系统发起缓考→打67791118说明情况→找任课老师系统通过

【系统链接】
- 学生系统：https://webvpn.sues.edu.cn/
- 自助打印：https://webvpn.sues.edu.cn/
- 教务处官网：https://jwc.sues.edu.cn/

【特别提醒】
- 欠费不能选课
- 只有替代后才有学分
- 课程代码变更一定要做替代
- 加课、退课成功与否根据课表判断`;

        let conversationHistory = [{ role: 'system', content: systemPrompt }];
        
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatArea = document.getElementById('chatArea');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const typing = document.getElementById('typing');
        
        function askQuestion(q) {
            questionInput.value = q;
            sendMessage();
        }
        
        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        questionInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            welcomeMsg.style.display = 'none';
            addMessage(question, 'student');
            questionInput.value = '';
            questionInput.style.height = 'auto';
            
            typing.classList.add('active');
            chatArea.scrollTop = chatArea.scrollHeight;
            sendBtn.disabled = true;
            
            try {
                conversationHistory.push({ role: 'user', content: question });
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: conversationHistory,
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                const answer = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答这个问题。';
                
                conversationHistory.push({ role: 'assistant', content: answer });
                addMessage(answer, 'teacher');
            } catch (error) {
                addMessage('抱歉，连接出现了问题。请稍后再试。', 'teacher');
            }
            
            typing.classList.remove('active');
            sendBtn.disabled = false;
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let avatarHTML;
            if (sender === 'teacher') {
                avatarHTML = `<img src="智慧老师照片.jpg" class="message-avatar" alt="智慧老师">`;
            } else {
                avatarHTML = `<div class="message-avatar">学</div>`;
            }
            
            messageDiv.innerHTML = `
                ${avatarHTML}
                <div class="message-content">${content}</div>
            `;
            
            chatArea.insertBefore(messageDiv, typing);
        }
    </script>
</body>
